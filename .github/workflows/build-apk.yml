name: Build Android APK

# Builds the MyPropertyQR (Patta + A-Register) debug APK in the cloud and uploads it
# as a downloadable artifact. Runs on changes to the app, or on-demand.
on:
  push:
    paths:
      - 'mobile-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'   # Capacitor 6's Gradle 8.2.1 wrapper won't run on Java 21

      - uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: npm install

      - name: Add + sync Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyPropertyQR-app-debug
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
