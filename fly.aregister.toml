# fly.toml — SEPARATE Fly app for the A-REGISTER (Adangal) OTP service.
# Same Docker image as patta, different entry point (aregister/server.js) and its
# own app/machine — fully isolated from mpqr-pat-bot and mpqr-register.
#
# Deploy:
#   fly apps create mpqr-aregister       # first time only
#   fly deploy -c fly.aregister.toml --remote-only

app = "mpqr-aregister"
primary_region = "bom"           # Mumbai — eservices.tn.gov.in needs an Indian IP
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

# Run the A-Register entry instead of the patta one (overrides the image CMD).
[processes]
  app = "node aregister/server.js"

[deploy]
  strategy = "immediate"          # bom often lacks capacity for blue-green

[env]
  NODE_ENV = "production"
  PORT = "3050"
  PLAYWRIGHT_HEADLESS = "true"
  PLAYWRIGHT_TIMEOUT_MS = "30000"
  # Runs real headless browsers for the A-Register OTP flow (like patta). ~300 MB
  # each; keep the cap >= warm pool + peak concurrent verifies or launches queue.
  MPQR_MAX_CONCURRENT_BROWSERS = "5"
  MPQR_WARM_POOL_SIZE = "2"
  MPQR_KEEPALIVE_MS = "0"
  MPQR_RSS_CEILING_MB = "1700"
  # Location dropdowns are proxied from the patta service's live cache.
  PATTA_LIVE_URL = "https://mpqr-pat-bot.fly.dev"

[http_service]
  internal_port = 3050
  force_https = true
  auto_stop_machines = "off"      # always-on
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"                  # each live A-Register session pins one headless browser
  cpus = 2
  cpu_kind = "shared"
